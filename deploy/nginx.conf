# vision-mcp nginx site — independent server block.
# Place at /etc/nginx/sites-available/vision-mcp and symlink to sites-enabled.
# install.sh substitutes __FILL_TOKEN__ before copying.

server {
    listen 443 ssl;
    server_name vision.liuxl.com.cn;

    ssl_certificate     /etc/letsencrypt/live/liuxl.com.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liuxl.com.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;
    client_body_buffer_size 1m;
    client_body_temp_path /var/lib/nginx/vision_tmp;
    client_body_timeout 60s;

    access_log /var/log/nginx/vision-mcp.access.log;
    error_log  /var/log/nginx/vision-mcp.error.log warn;

    location = /healthz {
        proxy_pass http://127.0.0.1:8100/healthz;
        proxy_set_header Host $host;
    }

    location = /mcp {
        if ($http_authorization != "Bearer __FILL_TOKEN__") {
            return 401;
        }
        proxy_pass http://127.0.0.1:8100/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    listen 80;
    server_name vision.liuxl.com.cn;
    return 301 https://$host$request_uri;
}